services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: sovereing_gateway_db
    environment:
      POSTGRES_USER: chancay_admin
      POSTGRES_PASSWORD: chancay_password
      POSTGRES_DB: sovereign_gateway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  api:
    build: 
      context: ./backend
    container_name: sovereing_gateway_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Montamos la carpeta local a /app en el contenedor para tener Hot-Reload al editar Python
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://chancay_admin:chancay_password@db:5432/sovereign_gateway
    # Forzamos uvicorn con --reload en local
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - db

  web:
    build: 
      context: ./frontend
      target: dev
    container_name: sovereing_gateway_web
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    # Montamos la carpeta local para hot-reload de Next.js, 
    # pero aislamos node_modules para evitar conflictos entre Windows y Linux.
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    command: ["npm", "run", "dev"]
    depends_on:
      - api

volumes:
  pgdata:
