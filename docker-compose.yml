# COMEX.AI / Sovereign Gateway — backend local (Supabase + ChromaDB)
#
# Uso:
#   docker compose up --build -d
#
# Frontend: NO va en Docker (despliegue en Vercel).
#   Desarrollo local: cd frontend && npm run dev  → http://localhost:3000
#   Variable: NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
#
# BD: Supabase (backend/.env) — sin PostgreSQL en Docker

services:
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: sovereign_gateway_chroma
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sovereign_gateway_api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      STORAGE_LOCAL_PATH: /app/uploads
      ENVIRONMENT: development
      RUN_SEED_ON_START: "true"
      SQL_ECHO: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,https://*.vercel.app
    volumes:
      - ./backend:/app
      - api_uploads:/app/uploads
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

volumes:
  chroma_data:
  api_uploads:
